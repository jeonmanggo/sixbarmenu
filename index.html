<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>칵테일 레시피북 — 메뉴판</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <div class="hero-inner">
    <p class="eyebrow">PRIVATE BAR LEDGER</p>
    <h1 class="hero-title">칵테일 레시피북</h1>
    <p class="hero-sub">기주별로 정리한 <span id="statTotal">0</span>종의 레시피</p>
    <div class="hero-stats" id="heroStats"></div>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>

<div class="toolbar">
  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="이름 또는 기주로 검색…" autocomplete="off" />
  </div>
  <div class="filters">
    <div class="filter-group" id="iceFilter">
      <button data-val="all" class="chip active">얼음 전체</button>
      <button data-val="o" class="chip">있음</button>
      <button data-val="x" class="chip">없음</button>
    </div>
    <div class="filter-group" id="alcFilter">
      <button data-val="all" class="chip active">알콜 전체</button>
      <button data-val="light" class="chip">가벼움</button>
      <button data-val="medium" class="chip">중간</button>
      <button data-val="strong" class="chip">묵직함</button>
    </div>
    <button id="randomBtn" class="random-btn">🎲 오늘의 한 잔</button>
  </div>
</div>

<nav class="group-index" id="groupIndex"></nav>

<main id="main"></main>

<p class="result-empty" id="emptyState" hidden>검색 결과가 없어요. 다른 키워드로 찾아보세요.</p>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="ticket" id="ticket">
    <button class="ticket-close" id="ticketClose" aria-label="닫기">×</button>
    <div class="ticket-stamp" id="ticketStamp">RECIPE</div>
    <div class="ticket-thumb" id="ticketThumb"></div>
    <p class="ticket-base" id="ticketBase"></p>
    <h2 class="ticket-name" id="ticketName"></h2>
    <div class="ticket-badges" id="ticketBadges"></div>
    <div class="ticket-divider"></div>
    <ul class="ticket-recipe" id="ticketRecipe"></ul>
    <p class="ticket-feature" id="ticketFeature"></p>
    <p class="ticket-extra" id="ticketExtra"></p>
    <div class="ticket-photo-row">
      <a class="ticket-photo" id="ticketPhoto" target="_blank" rel="noopener">🔍 구글에서 사진 찾아보기</a>
      <p class="ticket-photo-hint">찾은 사진을 저장해서 images 폴더에 "<span id="ticketHintName"></span>.jpg"로 넣으면 자동으로 표시돼요</p>
    </div>
  </div>
</div>

<footer class="site-footer">
  <p>개인 레시피북을 기반으로 생성된 로컬 메뉴판입니다.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
